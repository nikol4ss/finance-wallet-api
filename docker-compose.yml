services:
  postgres:
    image: postgres:16
    container_name: finance-wallet-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    container_name: finance-wallet-api
    depends_on:
      - postgres
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}

volumes:
  pgdata:
